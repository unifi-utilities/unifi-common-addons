# Enable IPv6 Router Advertisements
enable-ra

# br0 (main LAN) - auto-detect prefix from interface
dhcp-range=::,constructor:br0,ra-names,slaac,64,12h

# br300 (VLAN 300) - auto-detect prefix from interface
dhcp-range=::,constructor:br300,ra-names,slaac,64,12h

# Add a dhcp-range line for each additional VLAN, for example:
# dhcp-range=::,constructor:br10,ra-names,slaac,64,12h
# dhcp-range=::,constructor:br20,ra-names,slaac,64,12h

# Provide the UDM itself as the IPv6 DNS server
dhcp-option=option6:dns-server,[::]
