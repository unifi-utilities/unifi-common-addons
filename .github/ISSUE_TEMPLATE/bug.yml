name: Bug Report
description: Report a reproducible bug.
type: "Bug"
body:
  - type: textarea
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    attributes:
      label: To reproduce
      description: Steps to reproduce the behavior.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    attributes:
      label: System information
      description: |
        - Device variant (e.g. UniFi Cloud Gateway, UniFi Dream Machine Pro SE):
        - UniFi OS (UOS) version:
        - UniFi Network Application (UNA) version:
        - Script/add-on version:
    validations:
      required: true
  - type: textarea
    attributes:
      label: Additional context
      description: Add any other context about the problem here, including logs if relevant.